<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>КАДР — Фотогалерея</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111010;
    --surface: #1a1918;
    --text: #e8e2d9;
    --text-muted: #7a7370;
    --accent: #c8a96e;
    --accent-dim: rgba(200,169,110,0.15);
    --polaroid-bg: #f5f0e8;
    --filter-bg: #231f1e;
    --filter-active: #c8a96e;
    --border: rgba(255,255,255,0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(17,16,16,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 clamp(16px, 4vw, 56px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    gap: 10px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    letter-spacing: .08em;
    color: var(--accent);
    text-decoration: none;
    display: flex;
    align-items: baseline;
    gap: 6px;
    flex-shrink: 0;
  }
  .logo span {
    font-size: .7rem;
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    letter-spacing: .25em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  /* ── КНОПКИ ── */
  .btn-group {
    display: flex;
    gap: 12px;
    flex-shrink: 0;
  }
  .action-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 7px 16px;
    border: 1px solid var(--accent);
    border-radius: 2px;
    background: var(--accent-dim);
    color: var(--accent);
    font-family: 'Jost', sans-serif;
    font-size: .8rem;
    font-weight: 400;
    letter-spacing: .08em;
    text-decoration: none;
    transition: background .2s, color .2s;
    white-space: nowrap;
    cursor: pointer;
  }
  .action-btn:hover {
    background: var(--accent);
    color: #111;
  }
  .qr-btn {
    background: transparent;
    border-color: var(--text-muted);
    color: var(--text-muted);
  }
  .qr-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #111;
  }

  /* ── МОДАЛЬНОЕ ОКНО С QR ── */
  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(8px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal.open {
    display: flex;
  }
  .modal-content {
    background: var(--surface);
    padding: 30px;
    border-radius: 12px;
    text-align: center;
    border: 1px solid var(--accent);
    max-width: 300px;
    width: 90%;
    position: relative;
  }
  .modal-content p {
    margin-bottom: 15px;
    color: var(--text);
    font-size: 1rem;
  }
  .modal-content img {
    width: 200px;
    height: auto;
    margin-bottom: 15px;
  }
  .close-modal {
    position: absolute;
    top: 10px;
    right: 15px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 24px;
    cursor: pointer;
  }
  .close-modal:hover {
    color: var(--accent);
  }

  /* ── HERO ── */
  .hero {
    padding: clamp(40px, 8vw, 80px) clamp(16px, 4vw, 56px) 0;
    max-width: 600px;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.4rem);
    line-height: 1.15;
    font-weight: 400;
  }
  .hero h1 em {
    font-style: italic;
    color: var(--accent);
  }
  .hero p {
    margin-top: 14px;
    font-size: .9rem;
    letter-spacing: .05em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  /* ── FILTER BAR ── */
  .filter-section {
    padding: clamp(24px, 4vw, 40px) clamp(16px, 4vw, 56px) 0;
  }

  .filter-group {
    margin-bottom: 14px;
  }

  .filter-group-label {
    font-size: .65rem;
    letter-spacing: .3em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .filter-group-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .filter-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .pill {
    padding: 5px 14px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: var(--filter-bg);
    color: var(--text-muted);
    font-family: 'Jost', sans-serif;
    font-size: .78rem;
    font-weight: 400;
    letter-spacing: .06em;
    cursor: pointer;
    transition: all .2s ease;
    white-space: nowrap;
  }
  .pill:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .pill.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  .pill.all-pill {
    border-color: rgba(255,255,255,0.15);
  }
  .pill.all-pill.active {
    background: var(--accent);
    color: #111;
  }

  /* ── GALLERY ── */
  .gallery-wrap {
    padding: clamp(24px, 4vw, 40px) clamp(16px, 4vw, 56px) 60px;
  }

  .count-bar {
    font-size: .72rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 24px;
  }
  .count-bar strong {
    color: var(--accent);
    font-weight: 500;
  }

  .grid {
    columns: 3 280px;
    column-gap: 24px;
  }

  /* ── POLAROID ── */
  .polaroid-wrap {
    break-inside: avoid;
    margin-bottom: 24px;
    display: inline-block;
    width: 100%;
  }

  .polaroid {
    background: var(--polaroid-bg);
    padding: 10px 10px 36px;
    box-shadow:
      0 4px 8px rgba(0,0,0,.5),
      0 12px 32px rgba(0,0,0,.45),
      0 1px 2px rgba(255,255,255,.04) inset;
    cursor: pointer;
    transition: transform .3s cubic-bezier(.22,.68,0,1.2), box-shadow .3s ease;
    will-change: transform;
    position: relative;
  }

  .polaroid { transform: rotate(var(--rot, 0deg)); }
  .polaroid:hover {
    transform: rotate(0deg) scale(1.03);
    box-shadow:
      0 8px 20px rgba(0,0,0,.6),
      0 24px 56px rgba(0,0,0,.5);
    z-index: 2;
  }

  .polaroid img {
    width: 100%;
    display: block;
    aspect-ratio: 4/3;
    object-fit: cover;
    filter: sepia(8%) contrast(1.04);
  }

  .polaroid-caption {
    margin-top: 8px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: .82rem;
    color: #555;
    text-align: center;
    letter-spacing: .03em;
  }

  .badge {
    position: absolute;
    top: 14px;
    left: 14px;
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(4px);
    color: rgba(255,255,255,.75);
    font-size: .6rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 2px;
    pointer-events: none;
  }

  .polaroid-wrap.hidden {
    display: none;
  }

  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(10,9,9,.92);
    backdrop-filter: blur(6px);
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
    padding: 20px;
  }
  .lightbox.open {
    display: flex;
    animation: lbIn .25s ease;
  }
  @keyframes lbIn {
    from { opacity:0; }
    to { opacity:1; }
  }

  .lightbox-inner {
    position: relative;
    max-width: min(90vw, 1000px);
    cursor: default;
    animation: lbSlide .3s cubic-bezier(.22,.68,0,1.1);
  }
  @keyframes lbSlide {
    from { transform: scale(.9) translateY(20px); opacity:0; }
    to   { transform: scale(1) translateY(0);     opacity:1; }
  }

  .lightbox-polaroid {
    background: var(--polaroid-bg);
    padding: 12px 12px 52px;
    box-shadow: 0 24px 80px rgba(0,0,0,.9);
  }

  .lightbox-polaroid img {
    width: 100%;
    display: block;
    max-height: 70vh;
    object-fit: contain;
  }

  .lightbox-polaroid .lb-caption {
    text-align: center;
    margin-top: 12px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1rem;
    color: #444;
  }

  .lightbox-close {
    position: absolute;
    top: -40px;
    right: 0;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1.6rem;
    cursor: pointer;
    transition: color .2s;
    line-height: 1;
  }
  .lightbox-close:hover { color: var(--text); }

  .lb-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,.08);
    border: none;
    color: var(--text);
    font-size: 1.6rem;
    width: 42px; height: 42px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
  }
  .lb-nav:hover { background: rgba(255,255,255,.18); }
  .lb-prev { left: -56px; }
  .lb-next { right: -56px; }

  .empty {
    display: none;
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 0;
    color: var(--text-muted);
  }
  .empty.show { display: block; }
  .empty .icon { font-size: 3rem; margin-bottom: 12px; opacity:.3; }

  @media (max-width: 680px) {
    .grid { columns: 2 160px; column-gap: 14px; }
    .polaroid-wrap { margin-bottom: 14px; }
    .lb-prev { left: -12px; top: auto; bottom: -48px; transform: none; }
    .lb-next { right: -12px; top: auto; bottom: -48px; transform: none; }
    .action-btn { padding: 5px 10px; font-size: .7rem; gap: 4px; }
  }
  @media (max-width: 480px) {
    .logo span { display: none; }
    .btn-group { gap: 6px; }
    .action-btn { padding: 5px 8px; }
  }
</style>
</head>

<header>

const ROTATIONS = [-2.4, -1.2, 0.6, 1.8, -0.8, 2.1, -1.6, 0.4, -2.0, 1.4];

let currentFilter = 'all';
let visiblePhotos = [];
let lbIndex = 0;

const grid = document.getElementById('grid');
const countEl = document.getElementById('count');
const emptyEl = document.getElementById('empty');
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
const lbCap = document.getElementById('lbCaption');

function buildGrid() {
  grid.innerHTML = '';
  visiblePhotos = currentFilter === 'all' ? photos : photos.filter(p => p.cat === currentFilter);

  countEl.textContent = visiblePhotos.length;
  emptyEl.classList.toggle('show', visiblePhotos.length === 0);

  visiblePhotos.forEach((photo, idx) => {
    const rot = ROTATIONS[idx % ROTATIONS.length];
    const wrap = document.createElement('div');
    wrap.className = 'polaroid-wrap';

    wrap.innerHTML = `
      <div class="polaroid" style="--rot:${rot}deg" data-index="${idx}">
        <span class="badge">${photo.label}</span>
        <img src="${photo.src}" alt="${photo.caption}" loading="lazy">
        <div class="polaroid-caption">${photo.caption}</div>
      </div>`;

    wrap.querySelector('.polaroid').addEventListener('click', () => openLightbox(idx));
    grid.appendChild(wrap);
  });
}

document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    buildGrid();
  });
});

function openLightbox(idx) {
  lbIndex = idx;
  updateLightbox();
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
}

function updateLightbox() {
  const p = visiblePhotos[lbIndex];
  lbImg.src = p.src;
  lbCap.textContent = p.caption;
}

document.getElementById('lbClose').addEventListener('click', closeLightbox);
lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

document.getElementById('lbPrev').addEventListener('click', e => {
  e.stopPropagation();
  lbIndex = (lbIndex - 1 + visiblePhotos.length) % visiblePhotos.length;
  updateLightbox();
});

document.getElementById('lbNext').addEventListener('click', e => {
  e.stopPropagation();
  lbIndex = (lbIndex + 1) % visiblePhotos.length;
  updateLightbox();
});

document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') { lbIndex = (lbIndex - 1 + visiblePhotos.length) % visiblePhotos.length; updateLightbox(); }
  if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % visiblePhotos.length; updateLightbox(); }
});

buildGrid();

// Модальное окно для QR-кода
const modal = document.getElementById('qrModal');
const showBtn = document.getElementById('showQrBtn');
const closeBtn = document.getElementById('closeModalBtn');

showBtn.addEventListener('click', () => {
  modal.classList.add('open');
});

closeBtn.addEventListener('click', () => {
  modal.classList.remove('open');
});

modal.addEventListener('click', (e) => {
  if (e.target === modal) {
    modal.classList.remove('open');
  }
});
</script>
</body>
</html>
